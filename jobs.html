<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresher Jobs | Intern Theory</title>
    <script src="https://kit.fontawesome.com/833a729023.js" crossorigin="anonymous"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/footer.css">
    <link rel="stylesheet" href="./style/m_sidebar2.css">

    <!-- Page Specific Style (Reusing Courses Design) -->
    <link rel="stylesheet" href="./style/courses.css?v=3">

    <style>
        /* Additional overrides for Jobs page if needed */
        body {
            overflow-x: hidden;
        }
    </style>
</head>

<body>

    <!-- Navbar Container -->
    <div id="navBarBox"></div>

    <!-- Mobile Sidebar Container -->
    <div id="sidebar_div"></div>

    <div class="page-container">
        <!-- Main Content -->
        <div class="main-content">

            <!-- Filters Section -->
            <div class="filters-container">
                <select id="city" class="filter-select">
                    <option value="">All Cities</option>
                </select>

                <select id="work_type" class="filter-select">
                    <option value="">All Types</option>
                </select>

                <select id="category" class="filter-select">
                    <option value="">All Categories</option>
                </select>

                <!-- Search Button (Optional, for visual consistency) -->
                <button class="apply-btn" style="border-radius: 8px; padding: 10px 20px; margin-left: auto;">
                    SEARCH
                </button>
            </div>

            <!-- Jobs Grid -->
            <div class="internship-list">
                <!-- Dynamic Content Loaded Here -->
            </div>

        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer_container"></div>

    <!-- Scripts -->
    <script type="module" src="./script/layout.js"></script>
    <script type="module" src="./script/pages/jobsHandler.js"></script>

</body>

</html>
