    <script type="module">
    import { TokenManager, getCurrentUser } from './script/auth.js';
    import { initUserProfile } from './script/userProfileHandler.js';
    import navBar from './component/navBar.js';

    // Load navbar
    const navBarBox = document.getElementById('navBarBox');
    if (navBarBox) {
        navBarBox.innerHTML = navBar();
    }

    // Initialize user profile in navbar
    setTimeout(() => {
        initUserProfile();
    }, 200);

    // Check authentication and load profile
    const token = TokenManager.getToken();
    if (!token) {
        document.getElementById('profileContent').innerHTML = `
            <div style="text-align: center; padding: 40px;">
                <h2 style="color: #dc2626; margin-bottom: 20px;">Please Login</h2>
                <p style="color: #6b7280; margin-bottom: 20px;">You need to be logged in to view your profile.</p>
                <a href="login.html" style="display: inline-block; padding: 12px 30px; background: #0066CC; color: white; text-decoration: none; border-radius: 8px;">Go to Login</a>
            </div>
        `;
    } else {
        loadProfile();
    }

    async function loadProfile() {
        try {
            const response = await getCurrentUser();
            const user = response.user;

            if (!user) {
                throw new Error('User data not found');
            }

            const initials = `${user.firstName.charAt(0)}${user.lastName ? user.lastName.charAt(0) : ''}`.toUpperCase();
            const fullName = `${user.firstName} ${user.lastName}`.trim();
            const userType = user.userType || 'student';

            document.getElementById('profileContent').innerHTML = `
                <div class="card-dat">
                    <div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #0066CC 0%, #FF6600 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; font-weight: 700; margin: 0 auto 20px; box-shadow: 0 4px 12px rgba(0,102,204,0.3);">
                        ${initials}
                    </div>
                    <h1 style="text-align: center; margin-bottom: 15px;">${fullName}</h1>
                    <h2 style="text-align: center; text-transform: capitalize; color: #0066CC; margin-bottom: 20px;">${userType}</h2>
                    <div style="padding: 20px; background: #f9fafb; border-radius: 12px; margin-top: 20px;">
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-envelope" style="color: #0066CC; margin-right: 10px;"></i>
                            Email: ${user.email || 'Not provided'}
                        </h2>
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-phone" style="color: #0066CC; margin-right: 10px;"></i>
                            Mobile: ${user.mobile || 'Not provided'}
                        </h2>
                        ${user.city ? `
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-map-marker-alt" style="color: #0066CC; margin-right: 10px;"></i>
                            City: ${user.city}
                        </h2>
                        ` : ''}
                        ${user.qualification ? `
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-graduation-cap" style="color: #0066CC; margin-right: 10px;"></i>
                            Qualification: ${user.qualification}
                        </h2>
                        ` : ''}
                        ${user.companyName ? `
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-building" style="color: #0066CC; margin-right: 10px;"></i>
                            Company: ${user.companyName}
                        </h2>
                        ` : ''}
                        ${user.companyAddress ? `
                        <h2 style="margin-bottom: 10px; color: #1f2937;">
                            <i class="fas fa-map-marked-alt" style="color: #0066CC; margin-right: 10px;"></i>
                            Address: ${user.companyAddress}
                        </h2>
                        ` : ''}
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <a href="dashboard.html" style="display: inline-block; padding: 12px 30px; background: #0066CC; color: white; text-decoration: none; border-radius: 8px; margin-right: 10px;">
                            <i class="fas fa-tachometer-alt" style="margin-right: 8px;"></i>Go to Dashboard
                        </a>
                        <a href="index.html" style="display: inline-block; padding: 12px 30px; background: #FF6600; color: white; text-decoration: none; border-radius: 8px;">
                            <i class="fas fa-home" style="margin-right: 8px;"></i>Home
                        </a>
                    </div>
                </div>
            `;
        } catch (error) {
            console.error('Error loading profile:', error);
            document.getElementById('profileContent').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: #dc2626; margin-bottom: 20px;">Error Loading Profile</h2>
                    <p style="color: #6b7280; margin-bottom: 20px;">${error.message}</p>
                    <a href="login.html" style="display: inline-block; padding: 12px 30px; background: #0066CC; color: white; text-decoration: none; border-radius: 8px;">Login Again</a>
                </div>
            `;
        }
    }

    // Handle navbar button clicks
    setTimeout(() => {
        const registerBtn = document.getElementById('register_btn');
        if (registerBtn) {
            registerBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'register.html';
            });
        }

        const loginBtn = document.getElementById('login_btn');
        if (loginBtn) {
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'login.html';
            });
        }
    }, 100);
</script>
