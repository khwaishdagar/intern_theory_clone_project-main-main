<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Card Background -->
  <defs>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="400" height="300" rx="16" fill="url(#cardBg2)" filter="url(#shadow2)"/>
  <rect width="400" height="300" rx="16" fill="none" stroke="#e9ecef" stroke-width="2" />
  
  <!-- Top decorative element with Indian flag colors -->
  <rect x="0" y="0" width="400" height="8" rx="16 16 0 0" fill="#FF9933" />
  <rect x="0" y="8" width="400" height="8" fill="#FFFFFF" />
  <rect x="0" y="16" width="400" height="8" fill="#138808" />
  
  <!-- Government emblem symbol at top -->
  <circle cx="200" cy="60" r="28" fill="#fff5e6" stroke="#d97706" stroke-width="3" />
  <circle cx="200" cy="60" r="20" fill="none" stroke="#0066CC" stroke-width="2" />
  <circle cx="200" cy="60" r="3" fill="#0066CC" />
  <!-- Star pattern -->
  <g fill="#d97706">
    <circle cx="200" cy="45" r="2" />
    <circle cx="215" cy="60" r="2" />
    <circle cx="200" cy="75" r="2" />
    <circle cx="185" cy="60" r="2" />
  </g>
  
  <!-- Main Title -->
  <text x="200" y="120" font-family="'Georgia', serif" font-size="30" font-weight="bold" fill="#1a237e" text-anchor="middle">
    Shri Jayant Chaudhary
  </text>
  
  <!-- Subtitle with background -->
  <rect x="75" y="135" width="250" height="28" rx="14" fill="#e3f2fd" />
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1976d2" text-anchor="middle" letter-spacing="2.5">
    HON'BLE MINISTER OF STATE
  </text>
  
  <!-- Quote with decorative quotes -->
  <text x="35" y="190" font-family="Georgia, serif" font-size="70" fill="#e0e0e0" opacity="0.3">"</text>
  
  <text x="200" y="195" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#37474f" text-anchor="middle">
    <tspan x="200" dy="0">New skills such as AI, machine learning,</tspan>
    <tspan x="200" dy="18">and automation are transforming industries</tspan>
    <tspan x="200" dy="18">and highlighting the critical need for</tspan>
    <tspan x="200" dy="18">continuous learning.</tspan>
  </text>
  
  <!-- Bottom decorative line -->
  <line x1="80" y1="275" x2="320" y2="275" stroke="#0066CC" stroke-width="3" stroke-linecap="round" />
</svg>
