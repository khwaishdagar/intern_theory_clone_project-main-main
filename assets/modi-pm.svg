<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Card Background -->
  <rect width="400" height="300" rx="12" fill="#ffffff" />
  <rect width="400" height="300" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1" />
  
  <!-- Top Icon Circle with Checkmark -->
  <circle cx="200" cy="50" r="20" fill="#f0f7f0" stroke="#4CAF50" stroke-width="2" />
  <path d="M 192 50 L 198 56 L 208 44" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Main Title -->
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a237e" text-anchor="middle">
    Shri Narendra Modi
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#6c757d" text-anchor="middle" letter-spacing="2">
    HON'BLE PRIME MINISTER
  </text>
  
  <!-- Quote Line 1 -->
  <text x="200" y="190" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#495057" text-anchor="middle">
    Skill development of the new generation is a
  </text>
  
  <!-- Quote Line 2 -->
  <text x="200" y="210" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#495057" text-anchor="middle">
    national need and is the foundation of
  </text>
  
  <!-- Quote Line 3 -->
  <text x="200" y="230" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#495057" text-anchor="middle">
    Aatmnirbhar Bharat
  </text>
  
  <!-- Decorative bottom border -->
  <rect x="100" y="260" width="200" height="2" rx="1" fill="#ff9933" />
  <rect x="100" y="265" width="200" height="2" rx="1" fill="#ffffff" />
  <rect x="100" y="270" width="200" height="2" rx="1" fill="#138808" />
</svg>
