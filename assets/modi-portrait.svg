<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Circular mask for the image -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
    
    <!-- Shadow filter -->
    <filter id="imageShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    
    <!-- Gradient border (Indian flag colors) -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient border -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#borderGradient)" stroke-width="8"/>
  
  <!-- White background circle -->
  <circle cx="200" cy="200" r="185" fill="white"/>
  
  <!-- Embedded image with circular clip -->
  <image 
    xlink:href="modi-don.jpeg" 
    x="20" 
    y="20" 
    width="360" 
    height="360" 
    clip-path="url(#circleClip)"
    filter="url(#imageShadow)"
    preserveAspectRatio="xMidYMid slice"/>
  
  <!-- Decorative ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
