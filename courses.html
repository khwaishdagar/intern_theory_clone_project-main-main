        function handleStateChange() {
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const selectedState = stateSelect.value;

            // Update City Options
            let cities = [];
            if (selectedState === "States") {
                cities = [...new Set(Internships_data.map(item => item.city))];
            } else {
                cities = [...new Set(Internships_data.filter(item => item.state === selectedState).map(item => item.city))];
            }
            cities.sort();

            citySelect.innerHTML = '<option value="Cities">All Cities</option>';
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });

            applyFilters();
        }

        function applyFilters() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const work = document.getElementById('work_type').value;

            let filtered = Internships_data.filter(item => {
                const stateMatch = state === "States" || item.state === state;
                const cityMatch = city === "Cities" || item.city === city;
                const workMatch = work === "Type" || item.time === work;
                return stateMatch && cityMatch && workMatch;
            });

            displaydata(filtered);
        }

        function displaydata(data) {
            const container = document.getElementById("all_intership");
            container.innerHTML = "";

            // Add Section Heading
            const heading = document.createElement("h2");
            heading.className = "section-title";
            heading.innerText = "All Internships";
            container.appendChild(heading);

            if (data.length === 0) {
                container.innerHTML += "<p style='grid-column: 1/-1; text-align: center; color: #666;'>No internships found matching your criteria.</p>";
                return;
            }

            data.forEach(function (item, index) {
                const card = document.createElement("div");
                card.className = "internship-card";
                // Staggered animation delay
                card.style.animationDelay = `${index * 0.05}s`;

                // Logo Section
                const logoDiv = document.createElement("div");
                logoDiv.className = "card-logo";
                const img = document.createElement("img");
                img.src = item.img;
                img.alt = item.name;
                img.onerror = function () {
                    this.src = 'https://via.placeholder.com/80?text=Logo';
                };
                logoDiv.appendChild(img);

                // Content Section
                const contentDiv = document.createElement("div");
                contentDiv.className = "card-content";

                const title = document.createElement("h3");
                title.className = "card-title";
                title.innerText = item.title;

                const company = document.createElement("p");
                company.className = "card-company";
                company.innerText = item.name;

                const details = document.createElement("div");
                details.className = "card-details";

                const createDetail = (iconClass, text) => {
                    const span = document.createElement("span");
                    span.className = "detail-item";
                    span.innerHTML = text;
                    return span;
                };

                details.appendChild(createDetail("fi-sr-briefcase", item.industry));
                details.appendChild(createDetail("fi-sr-marker", item.city));
                details.appendChild(createDetail("fi-sr-clock", item.time));
                details.appendChild(createDetail("fi-sr-money", item.Stipend));

                contentDiv.append(title, company, details);

                // Actions Section
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "card-actions";

                const duration = document.createElement("span");
                duration.className = "duration-badge";
                duration.innerText = item.weeks;

                const shareIcon = document.createElement("i");
                shareIcon.className = "fi fi-sr-share share-icon";

                const applyBtn = document.createElement("a");
                applyBtn.href = "javascript:void(0)";
                applyBtn.className = "apply-btn";
                applyBtn.innerHTML = `VIEW AND APPLY <i class="fi fi-sr-arrow-right"></i>`;

                actionsDiv.append(duration, shareIcon, applyBtn);

                // Assemble Card
                card.append(logoDiv, contentDiv, actionsDiv);
                container.appendChild(card);
            });
        }

        // Initial load
        handleStateChange(); // This will populate cities and call applyFilters (which calls displaydata)
