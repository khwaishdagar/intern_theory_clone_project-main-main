<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internships | Intern Theory</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/footer.css">
    <link rel="stylesheet" href="./style/m_sidebar2.css">

    <!-- Page Specific Style -->
    <link rel="stylesheet" href="style/courses.css?v=2">
</head>

<body style="overflow-x: hidden;">
    <!-- Mobile Sidebar Container -->
    <div id="sidebar_div"></div>

    <!-- Navbar Container -->
    <div id="navBarBox"></div>

    <div class="page-container">
        <!-- Sidebar / Ad -->
        <!-- Sidebar removed for cleaner layout -->
        <!-- <div class="sidebar">...</div> -->

        <!-- Main Content -->
        <div class="main-content">
            <!-- Filters -->
            <div class="filters-container">
                <select onchange="handleStateChange()" name="state" id="state" class="filter-select">
                    <option value="States">All States</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Chandigarh">Chandigarh</option>
                </select>
                <select onchange="applyFilters()" name="city" id="city" class="filter-select">
                    <option value="Cities">All Cities</option>
                </select>
                <select onchange="applyFilters()" name="work_type" id="work_type" class="filter-select">
                    <option value="Type">All Types</option>
                    <option value="Full Time Internship">Full Time</option>
                    <option value="Work From Home Internship">Work From Home</option>
                    <option value="Part Time Internship">Part Time</option>
                </select>
            </div>

            <!-- Internship List -->
            <div id="all_intership" class="internship-list">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer_container"></div>

    <!-- Scripts -->
    <script type="module" src="./script/layout.js"></script>
    <script type="module" src="./script/userProfileHandler.js"></script>

    <script>
        let Internships_data = [];

        async function initCoursesPage() {
            const container = document.getElementById("all_intership");
            if (!container) return;

            // Show loading state
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">Loading Courses from Skill India...</div>';

            try {
                // Fetch the scraped JSON file
                const res = await fetch('./skillindia_courses.json');
                if (res.ok) {
                    const rawData = await res.json();
                    const sourceItems = rawData?.Data?.Online?.Courses || rawData?.data?.content || [];
                    
                    Internships_data = sourceItems.map((course) => ({
                        img: course.CourseImageUrl || "https://assets.interntheory.com/creative/logo.png",
                        title: course.Title || "Skill India Course",
                        name: course.CreatedBy || course.providerName || "Skill India Partner",
                        time: course.CourseMode === 1 ? "Online Course" : "Offline Training",
                        industry: course.Sector?.[0]?.SectorName || course.sectorName || "Skill Development",
                        city: course.Language || course.location || "Multiple",
                        state: "India",
                        Stipend: course.Price > 0 ? `Price: ₹ ${course.Price}` : 'Free Course',
                        weeks: course.CourseStatistic?.EnrollmentCount ? `${course.CourseStatistic.EnrollmentCount} Enrolled` : 'View Course'
                    }));
                }
            } catch (err) {
                console.error("Error fetching Skill India courses data:", err);
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: red;">Failed to load data. Please ensure you are running this from a local server.</div>';
                return;
            }

            handleStateChange();
        }

        function handleStateChange() {
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const workTypeSelect = document.getElementById('work_type');
            
            const selectedState = stateSelect.value;

            // Update City Options (using language or location mapping)
            let cities = [];
            if (selectedState === "States") {
                cities = [...new Set(Internships_data.map(item => item.city))].filter(Boolean);
            } else {
                cities = [...new Set(Internships_data.filter(item => item.state === selectedState).map(item => item.city))].filter(Boolean);
            }
            cities.sort();

            citySelect.innerHTML = '<option value="Cities">All Languages / Locations</option>';
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
            
            // Also update work_type (Mode etc) based on data dynamically
            let types = [...new Set(Internships_data.map(item => item.time))].filter(Boolean);
            workTypeSelect.innerHTML = '<option value="Type">All Modes</option>';
            types.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                workTypeSelect.appendChild(option);
            });

            applyFilters();
        }

        function applyFilters() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const work = document.getElementById('work_type').value;

            let filtered = Internships_data.filter(item => {
                const stateMatch = state === "States" || item.state === state;
                const cityMatch = city === "Cities" || item.city === city;
                const workMatch = work === "Type" || item.time === work;
                return stateMatch && cityMatch && workMatch;
            });

            displaydata(filtered);
        }

        function displaydata(data) {
            const container = document.getElementById("all_intership");
            container.innerHTML = "";

            // Add Section Heading
            const heading = document.createElement("h2");
            heading.className = "section-title";
            heading.innerText = "Skill India Certification Courses";
            container.appendChild(heading);

            if (data.length === 0) {
                container.innerHTML += "<p style='grid-column: 1/-1; text-align: center; color: #666;'>No courses found matching your criteria.</p>";
                return;
            }

            // To not overwhelm browser, display first 60 results maximum
            const itemsToDisplay = data.slice(0, 60);

            itemsToDisplay.forEach(function (item, index) {
                const card = document.createElement("div");
                card.className = "internship-card";
                card.style.animationDelay = `${index * 0.05}s`;

                // Logo Section
                const logoDiv = document.createElement("div");
                logoDiv.className = "card-logo";
                const img = document.createElement("img");
                img.src = item.img;
                img.alt = item.name;
                img.onerror = function () {
                    this.src = 'https://via.placeholder.com/80?text=Skill+India';
                };
                logoDiv.appendChild(img);

                // Content Section
                const contentDiv = document.createElement("div");
                contentDiv.className = "card-content";

                const title = document.createElement("h3");
                title.className = "card-title";
                title.innerText = item.title;

                const company = document.createElement("p");
                company.className = "card-company";
                company.innerText = item.name;

                const details = document.createElement("div");
                details.className = "card-details";

                const createDetail = (iconClass, text) => {
                    const span = document.createElement("span");
                    span.className = "detail-item";
                    span.innerHTML = text; // Just using the text since we removed some icons for clean look 
                    return span;
                };

                details.appendChild(createDetail("fi-sr-briefcase", item.industry || "Skill Category"));
                details.appendChild(createDetail("fi-sr-marker", item.city)); // mapped to language in courses
                details.appendChild(createDetail("fi-sr-clock", item.time));
                
                const stipendDiv = document.createElement("div");
                stipendDiv.style.marginTop = "8px";
                stipendDiv.style.fontSize = "13px";
                stipendDiv.style.fontWeight = "600";
                stipendDiv.style.color = item.Stipend === 'Free Course' ? "#16a34a" : "#495057";
                stipendDiv.textContent = item.Stipend;

                contentDiv.append(title, company, details, stipendDiv);

                // Actions Section
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "card-actions";

                const duration = document.createElement("span");
                duration.className = "duration-badge";
                duration.style.background = "#3b82f6";
                duration.innerText = item.weeks;

                const shareIcon = document.createElement("i");
                shareIcon.className = "fi fi-sr-share share-icon";

                const applyBtn = document.createElement("button");
                applyBtn.className = "apply-btn";
                applyBtn.style.cursor = "pointer";
                applyBtn.style.background = "#fff5f0";
                applyBtn.style.color = "var(--primary-color)";
                applyBtn.innerHTML = `ENROLL NOW <i class="fi fi-sr-arrow-right"></i>`;
                applyBtn.onclick = () => window.open('https://www.skillindiadigital.gov.in/', '_blank');

                actionsDiv.append(duration, shareIcon, applyBtn);

                // Assemble Card
                card.append(logoDiv, contentDiv, actionsDiv);
                container.appendChild(card);
            });
        }

        // Initial load
        initCoursesPage();
    </script>
</body>

</html>
