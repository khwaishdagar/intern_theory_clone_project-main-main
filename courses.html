        function handleStateChange() {
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const selectedState = stateSelect.value;

            // Update City Options
            let cities = [];
            if (selectedState === "States") {
                cities = [...new Set(Internships_data.map(item => item.city))];
            } else {
                cities = [...new Set(Internships_data.filter(item => item.state === selectedState).map(item => item.city))];
            }
            cities.sort();

            citySelect.innerHTML = '<option value="Cities">All Cities</option>';
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });

            applyFilters();
        }

        function applyFilters() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const work = document.getElementById('work_type').value;

            let filtered = Internships_data.filter(item => {
                const stateMatch = state === "States" || item.state === state;
                const cityMatch = city === "Cities" || item.city === city;
                const workMatch = work === "Type" || item.time === work;
                return stateMatch && cityMatch && workMatch;
            });

            displaydata(filtered);
        }

        function getInitials(name) {
            if (!name) return "?";
            return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
        }

        function displaydata(data) {
            const container = document.getElementById("all_intership");
            container.innerHTML = "";

            // Section Heading
            const heading = document.createElement("h2");
            heading.className = "section-title";
            heading.innerText = "All Internships";
            container.appendChild(heading);

            if (data.length === 0) {
                const empty = document.createElement("p");
                empty.className = "list_empty_state";
                empty.textContent = "No internships found matching your criteria.";
                container.appendChild(empty);
                return;
            }

            data.forEach(function (item, index) {
                const card = document.createElement("div");
                card.className = "internship-card";
                card.style.animationDelay = `${index * 0.06}s`;

                /* Inner wrapper */
                const inner = document.createElement("div");
                inner.className = "card-inner";

                /* Header: logo + title + company */
                const header = document.createElement("div");
                header.className = "card-header";

                const logoDiv = document.createElement("div");
                logoDiv.className = "card-logo";

                if (item.img) {
                    const img = document.createElement("img");
                    img.src = item.img;
                    img.alt = item.name;
                    img.onerror = function () {
                        this.parentElement.innerHTML = `<div class="card-logo-placeholder">${getInitials(item.name)}</div>`;
                    };
                    logoDiv.appendChild(img);
                } else {
                    const ph = document.createElement("div");
                    ph.className = "card-logo-placeholder";
                    ph.textContent = getInitials(item.name);
                    logoDiv.appendChild(ph);
                }

                const titleBlock = document.createElement("div");
                titleBlock.className = "card-title-block";

                const title = document.createElement("h3");
                title.className = "card-title";
                title.textContent = item.title;

                const company = document.createElement("p");
                company.className = "card-company";
                company.textContent = item.name;

                titleBlock.append(title, company);
                header.append(logoDiv, titleBlock);

                /* Body: badges */
                const body = document.createElement("div");
                body.className = "card-body";

                const details = document.createElement("div");
                details.className = "card-details";

                if (item.industry) {
                    const b1 = document.createElement("span");
                    b1.className = "detail-item";
                    b1.innerHTML = `<i class="fi fi-sr-briefcase"></i> ${item.industry}`;
                    details.appendChild(b1);
                }
                if (item.city) {
                    const b2 = document.createElement("span");
                    b2.className = "detail-item";
                    b2.innerHTML = `<i class="fi fi-sr-marker"></i> ${item.city}`;
                    details.appendChild(b2);
                }
                if (item.time) {
                    const b3 = document.createElement("span");
                    b3.className = "detail-item";
                    b3.innerHTML = `<i class="fi fi-sr-clock"></i> ${item.time}`;
                    details.appendChild(b3);
                }

                body.appendChild(details);

                if (item.Stipend) {
                    const stipend = document.createElement("div");
                    stipend.className = "card-stipend";
                    stipend.innerHTML = `<i class="fi fi-sr-money-bill-wave"></i><span>${item.Stipend}</span>`;
                    body.appendChild(stipend);
                }

                inner.append(header, body);

                /* Actions footer */
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "card-actions";

                const duration = document.createElement("span");
                duration.className = "duration-badge";
                duration.textContent = item.weeks || "4-6 Weeks";

                const shareIcon = document.createElement("i");
                shareIcon.className = "fi fi-sr-share share-icon";

                const applyBtn = document.createElement("a");
                applyBtn.href = "javascript:void(0)";
                applyBtn.className = "apply-btn";
                applyBtn.innerHTML = `VIEW AND APPLY <i class="fi fi-rr-arrow-right"></i>`;

                actionsDiv.append(duration, shareIcon, applyBtn);
                card.append(inner, actionsDiv);
                container.appendChild(card);
            });
        }

        // Initial load
        handleStateChange(); // This will populate cities and call applyFilters (which calls displaydata)
